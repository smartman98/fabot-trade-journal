<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>매매 일지</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app">
    <h1>매매 일지</h1>
    <p class="sub">실제로 매매한 기록을 남겨보세요.</p>

    <section id="signal-section">
      <h2>오늘의 신호</h2>
      <div id="signal-banner" class="signal-banner" hidden></div>

      <div class="filter-row" id="filter-row">
        <button class="filter-btn" data-range="30">최근 30일</button>
        <button class="filter-btn active" data-range="90">최근 90일</button>
        <button class="filter-btn" data-range="365">최근 1년</button>
        <button class="filter-btn" data-range="all">전체</button>
      </div>

      <div class="chart-card">
        <p class="chart-title">F&G 지수 추이</p>
        <div style="position:relative;">
          <svg class="fg-chart" id="chart" viewBox="0 0 640 260" role="img" aria-label="F&G 지수 추이 차트"></svg>
          <div class="tooltip" id="tooltip"></div>
        </div>
        <button class="table-toggle" id="table-toggle">표로 보기</button>
        <div class="table-wrap" id="table-wrap" hidden>
          <table>
            <thead><tr><th>날짜</th><th>F&G 점수</th></tr></thead>
            <tbody id="table-body"></tbody>
          </table>
        </div>
      </div>
    </section>

    <hr class="section-divider" />

    <div id="summary-bar" class="summary-bar"></div>

    <!-- 목록 화면 -->
    <section id="list-view">
      <div class="list-header">
        <h2>매매 기록</h2>
        <button id="add-btn" class="primary-btn">+ 새 기록 추가</button>
      </div>
      <div id="loading" class="muted">불러오는 중…</div>
      <ul id="trade-list" class="trade-list"></ul>
    </section>

    <!-- 입력/수정 폼 화면 -->
    <section id="form-view" hidden>
      <h2 id="form-title">새 매매 기록</h2>
      <form id="trade-form" class="trade-form">
        <label>매매 날짜 <input type="date" id="f-date" required /></label>
        <label>종목 <input type="text" id="f-ticker" required /></label>
        <label>구분
          <select id="f-action" required>
            <option value="buy">매수</option>
            <option value="sell">매도</option>
          </select>
        </label>
        <label>수량 <input type="number" id="f-quantity" min="0" step="any" required /></label>
        <label>주가 <input type="number" id="f-price" min="0" step="any" required /></label>
        <label>그때 F&G 점수 (선택) <input type="number" id="f-fg" min="0" max="100" step="0.01" /></label>
        <label class="full">메모 (선택) <textarea id="f-memo" rows="3"></textarea></label>

        <div class="form-actions">
          <button type="submit" class="primary-btn">저장</button>
          <button type="button" id="cancel-btn" class="ghost-btn">취소</button>
        </div>
        <p id="form-error" class="error"></p>
      </form>
    </section>

    <!-- 상세 화면 -->
    <section id="detail-view" hidden>
      <h2>기록 상세</h2>
      <div id="detail-body" class="detail-body"></div>
      <div class="form-actions">
        <button id="detail-edit-btn" class="primary-btn">수정</button>
        <button id="detail-delete-btn" class="danger-btn">삭제</button>
        <button id="detail-back-btn" class="ghost-btn">목록으로</button>
      </div>
    </section>
  </div>

  <script src="fg_data.js"></script>
  <script src="app.js"></script>
</body>
</html>
